name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish Windows binaries
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\generate-icon.ps1
          Push-Location src-tauri
          cargo test --locked
          cargo build --release --locked --bin portKill-cli
          cargo build --release --locked --bin portKill
          Pop-Location

      - name: Prepare release package
        id: package
        shell: pwsh
        run: |
          $dist = "dist"
          $portable = "$dist/portKill-portable"
          $zip = "$dist/portKill-windows-x64-portable.zip"

          if (Test-Path $portable) {
            Remove-Item -LiteralPath $portable -Recurse -Force
          }
          if (Test-Path $zip) {
            Remove-Item -LiteralPath $zip -Force
          }

          New-Item -ItemType Directory -Force $portable | Out-Null
          Copy-Item "src-tauri/target/release/portKill.exe" "$portable/portKill.exe"
          Copy-Item "src-tauri/target/release/portKill-cli.exe" "$portable/portKill-cli.exe"

          @'
          portKill portable package

          Files:
          - portKill.exe: GUI version.
          - portKill-cli.exe: command line version.

          CLI:
            portKill-cli list [--json] [--protocol tcp|udp|all] [--state LISTENING] [--query text] [--listeners-only]
            portKill-cli find --port <port> [--json]
            portKill-cli kill --pid <pid> [--yes]

          Safety:
          - This tool does not run in the background.
          - This tool does not touch firewall rules.
          - This tool does not auto-kill processes.
          - PID 0, PID 4, and portKill itself are protected.
          '@ | Set-Content -LiteralPath "$portable/README.txt" -Encoding UTF8

          $portableFiles = Get-ChildItem -LiteralPath $portable -Force
          Compress-Archive -LiteralPath $portableFiles.FullName -DestinationPath $zip -Force

          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "${{ steps.package.outputs.zip }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release view $tag --json assets --jq '.assets[].name' |
              Where-Object { $_ -like "*.zip" } |
              ForEach-Object { gh release delete-asset $tag $_ --yes }
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $tag --notes "Automated release for $tag."
          }
