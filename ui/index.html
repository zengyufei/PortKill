<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>portKill</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="navigation">
        <div class="brand">
          <div class="mark" aria-hidden="true"><span></span></div>
          <div>
            <h1>portKill</h1>
            <p>看清端口，再结束进程。</p>
          </div>
        </div>

        <nav>
          <p class="nav-label">Categories</p>
          <button class="nav-item active" type="button" data-view="all">All Ports</button>
          <button class="nav-item" type="button" data-view="favorites">Favorites</button>
          <button class="nav-item" type="button" data-view="grouped">Grouped by Process</button>

          <p class="nav-label">Process Types</p>
          <button class="nav-item" type="button" data-type="web_server">Web Server</button>
          <button class="nav-item" type="button" data-type="database">Database</button>
          <button class="nav-item" type="button" data-type="development">Development</button>
          <button class="nav-item" type="button" data-type="system">System</button>
          <button class="nav-item" type="button" data-type="other">Other</button>
        </nav>
      </aside>

      <section class="workspace">
        <section class="topbar" aria-label="overview">
          <div>
            <p class="eyebrow" id="viewLabel">All Ports</p>
            <h2 id="viewTitle">All Ports</h2>
          </div>
          <div class="summary" aria-live="polite">
            <div>
              <strong id="countAll">0</strong>
              <span>当前结果</span>
            </div>
            <div>
              <strong id="countListen">0</strong>
              <span>监听/UDP</span>
            </div>
            <div>
              <strong id="countGroups">0</strong>
              <span>程序组</span>
            </div>
            <div>
              <strong id="countFavorites">0</strong>
              <span>收藏</span>
            </div>
          </div>
        </section>

        <section class="toolbar" aria-label="filters">
          <label class="search">
            <span>搜索</span>
            <input id="query" type="search" placeholder="端口、PID、进程名、用户、Command、路径" autocomplete="off" />
          </label>
          <label>
            <span>协议</span>
            <select id="protocol">
              <option value="all">全部</option>
              <option value="tcp">TCP</option>
              <option value="udp">UDP</option>
            </select>
          </label>
          <label>
            <span>IP 版本</span>
            <select id="ipVersion">
              <option value="all">全部</option>
              <option value="ipv4">IPv4</option>
              <option value="ipv6">IPv6</option>
            </select>
          </label>
          <label>
            <span>TCP 状态</span>
            <select id="state">
              <option value="">全部</option>
              <option value="LISTENING">LISTENING</option>
              <option value="ESTABLISHED">ESTABLISHED</option>
              <option value="TIME_WAIT">TIME_WAIT</option>
              <option value="CLOSE_WAIT">CLOSE_WAIT</option>
              <option value="SYN_SENT">SYN_SENT</option>
              <option value="SYN_RECEIVED">SYN_RECEIVED</option>
            </select>
          </label>
          <label class="toggle">
            <input id="showDetails" type="checkbox" />
            <span>显示连接明细</span>
          </label>
          <label>
            <span>视图</span>
            <select id="tableMode">
              <option value="simple" selected>简单视图</option>
              <option value="complex">复杂视图</option>
            </select>
          </label>
          <button id="refresh" type="button">刷新</button>
        </section>

        <section class="notice" id="notice" hidden></section>

        <section class="table-wrap simple-mode" id="tableView" aria-label="port table">
          <table>
            <thead>
              <tr>
                <th>端口</th>
                <th>进程</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr>
                <td colspan="3" class="empty">正在读取端口表</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="group-wrap" id="groupView" aria-label="process groups" hidden></section>
      </section>
    </main>

    <div class="modal-backdrop" id="modal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">确认结束进程</h2>
        <p id="modalText"></p>
        <dl id="modalFacts"></dl>
        <div class="modal-actions">
          <button id="cancelKill" type="button">取消</button>
          <button id="confirmKill" class="danger" type="button">结束进程</button>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
